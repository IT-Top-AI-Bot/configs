spring:
  application:
    name: journal-service-dev

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    consumer:
      group-id: journal-service-dev

  lifecycle:
    timeout-per-shutdown-phase: 30s

kafka:
  homework-execution-topic: homework-execution-dev
  homework-execution-result: homework-result-dev

auto-homework:
  check-interval-ms: 900000

s3:
  bucket: homeworks-solutions-dev

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    env:
      show-values: always
    configprops:
      show-values: always

logging:
  level:
    com.aquadev: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG