spring:
  application:
    name: journal-service

  threads:
    virtual:
      enabled: true

  cloud:
    aws:
      s3:
        endpoint: ${S3_ENDPOINT}
        region: ${S3_REGION:us-east-1}
        path-style-access-enabled: true
      credentials:
        access-key: ${S3_ACCESS_KEY}
        secret-key: ${S3_SECRET_KEY}

  task:
    scheduling:
      pool:
        size: 2

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    consumer:
      group-id: journal-service
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      observation-enabled: true
    template:
      observation-enabled: true

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
      timeout: 60000

  cache:
    type: redis

resilience4j:
  ratelimiter:
    instances:
      journalApi:
        limitForPeriod: 100
        limitRefreshPeriod: 1m
        timeoutDuration: 60s

journal:
  api:
    base-url: "https://msapi.top-academy.ru/api/v2"
    application-key: ${APPLICATION_KEY}
    user-agent: "itt-journal-service/1.0"
    journal-url: "https://journal.top-academy.ru"
    timeout:
      connect: 10000
      read: 15000

  token:
    refresh-interval: 14400000
    refresh-before-expiry: 300
    max-retry-attempts: 3

kafka:
  homework-execution-topic: homework-execution
  homework-execution-result: homework-result

auto-homework:
  check-interval-ms: 900000

s3:
  bucket: homeworks-solutions

crypto:
  secret-key: ${ENCRYPTION_KEY}

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}/v1/traces
    logging:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}/v1/logs
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT}/v1/metrics